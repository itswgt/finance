<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #888;
            --accent: #3498db;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --border: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f0f0f;
                --card-bg: #1a1a1a;
                --text-main: #e8e8e8;
                --text-dim: #666;
                --border: #2a2a2a;
            }
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; padding-bottom: 60px; }

        header {
            padding: 8px 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { margin: 0; font-size: 1.3rem; letter-spacing: -0.3px; }

        .section-title {
            font-size: 0.68rem;
            font-weight: 700;
            margin: 18px 0 8px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.2px;
        }

        /* ── Stat grid: always 4 columns on mobile ── */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.55rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.8px;
        }

        .stat-card p {
            margin: 6px 0 0;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Chart ── */
        .chart-container {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            height: 220px;
            border: 1px solid var(--border);
            position: relative;
        }

        /* ── Form area ── */
        .panel {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 0.95rem;
        }

        .input-group { margin-bottom: 11px; }
        label { display: block; font-size: 0.78rem; margin-bottom: 5px; font-weight: 600; color: var(--text-dim); }

        input, select {
            padding: 13px 12px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            width: 100%;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus { border-color: var(--accent); }

        /* Amount + Date side by side */
        .row-2 { display: flex; gap: 10px; }
        .row-2 .input-group { flex: 1; }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active { opacity: 0.85; }

        /* Settings row */
        .settings-row { display: flex; gap: 10px; align-items: flex-end; }
        .settings-row .input-group { flex: 1; margin-bottom: 0; }

        .utility-row { display: flex; gap: 8px; margin-top: 14px; }
        .btn-subtle {
            flex: 1;
            padding: 9px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-dim);
            transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-subtle:active { opacity: 0.7; }
        .btn-subtle:hover { border-color: var(--text-main); color: var(--text-main); }
        .btn-subtle.danger:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Table ── */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 4px;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
        tr:last-child td { border-bottom: none; }
        th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); background: var(--bg-color); }

        .btn-del {
            color: var(--text-dim);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-del:active { color: var(--danger); }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 28px;
        }

        /* toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--secondary);
            color: #fff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: transform 0.3s ease;
            pointer-events: none;
            z-index: 999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FinanceFlow <span style="font-weight:200">PRO</span></h1>
    </header>

    <div class="section-title" id="title-month">Monthly Breakdown</div>
    <div class="dashboard">
        <div class="stat-card"><h3>Total</h3><p id="m-total">$0</p></div>
        <div class="stat-card"><h3>Weekly</h3><p id="m-weekly">$0</p></div>
        <div class="stat-card"><h3>Daily</h3><p id="m-daily">$0</p></div>
        <div class="stat-card"><h3>Hourly</h3><p id="m-hourly">$0</p></div>
    </div>

    <div class="section-title" id="title-year">Annual Breakdown</div>
    <div class="dashboard">
        <div class="stat-card"><h3>Total</h3><p id="y-total">$0</p></div>
        <div class="stat-card"><h3>Weekly</h3><p id="y-weekly">$0</p></div>
        <div class="stat-card"><h3>Daily</h3><p id="y-daily">$0</p></div>
        <div class="stat-card"><h3>Hourly</h3><p id="y-hourly">$0</p></div>
    </div>

    <div class="chart-container">
        <canvas id="incomeChart"></canvas>
    </div>

    <!-- Add Entry -->
    <div class="panel">
        <h2 style="color: var(--accent);">Add Entry</h2>
        <div class="input-group">
            <label>Investment Name</label>
            <input type="text" id="name" list="prev-investments" placeholder="e.g. VTI, Salary…" autocomplete="off">
            <datalist id="prev-investments"></datalist>
        </div>
        <div class="row-2">
            <div class="input-group">
                <label>Amount ($)</label>
                <input type="number" id="amount" step="0.01" inputmode="decimal" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="date">
            </div>
        </div>
        <button class="btn-add" onclick="addEntry()">Save Entry</button>
    </div>

    <!-- Settings -->
    <div class="panel">
        <h2>Settings &amp; Filter</h2>
        <div class="input-group">
            <label>View Month</label>
            <input type="month" id="filter-month" onchange="render()">
        </div>
        <div class="utility-row">
            <button class="btn-subtle" onclick="exportCSV()">⬇ Export CSV</button>
            <button class="btn-subtle danger" onclick="clearData()">✕ Clear All</button>
        </div>
    </div>

    <!-- Table -->
    <div class="section-title">Entries</div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Date</th><th>Source</th><th>Amount</th><th></th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="toast">Entry saved ✓</div>

<script>
    let entries = JSON.parse(localStorage.getItem('finance_master_v5')) || [];
    let incomeChart;

    // Init filter to current month
    const filterEl = document.getElementById('filter-month');
    const now = new Date();
    filterEl.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    // Set today's date using local time (avoids timezone off-by-one on mobile)
    const dateEl = document.getElementById('date');
    const todayLocal = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    dateEl.value = todayLocal;

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function addEntry() {
        const nameEl   = document.getElementById('name');
        const amountEl = document.getElementById('amount');
        const dateEl   = document.getElementById('date');

        const name   = nameEl.value.trim();
        const amount = parseFloat(amountEl.value);
        // Read date as string directly — avoids mobile timezone issues
        const date   = dateEl.value;

        let valid = true;

        [nameEl, amountEl, dateEl].forEach(el => el.style.borderColor = '');

        if (!name)          { nameEl.style.borderColor   = 'var(--danger)'; valid = false; }
        if (isNaN(amount) || amountEl.value === '') { amountEl.style.borderColor = 'var(--danger)'; valid = false; }
        if (!date)          { dateEl.style.borderColor   = 'var(--danger)'; valid = false; }

        if (!valid) return;

        entries.push({ id: Date.now(), name, amount, date });
        localStorage.setItem('finance_master_v5', JSON.stringify(entries));

        // Reset only amount, keep name + date for quick multi-entry
        amountEl.value = '';
        amountEl.focus();

        showToast();
        render();
    }

    // Allow Enter key in amount field to save
    document.getElementById('amount').addEventListener('keydown', e => {
        if (e.key === 'Enter') addEntry();
    });

    function deleteEntry(id) {
        if (confirm('Delete this entry?')) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('finance_master_v5', JSON.stringify(entries));
            render();
        }
    }

    function exportCSV() {
        let csv = 'Date,Source,Amount\n';
        entries.forEach(e => csv += `${e.date},${e.name},${e.amount}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'finance_data.csv'; a.click();
    }

    function clearData() {
        if (confirm('Permanently delete all records?')) {
            localStorage.removeItem('finance_master_v5');
            entries = [];
            render();
        }
    }

    function fmt(n) {
        if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'k';
        return '$' + n.toFixed(2);
    }

    function render() {
        const filterMonth = filterEl.value;
        const [year, month] = filterMonth.split('-').map(Number);

        // Days in selected month
        const daysInMonth = new Date(year, month, 0).getDate();

        // Monthly filtered entries
        const filtered = entries
            .filter(e => e.date.startsWith(filterMonth))
            .sort((a, b) => new Date(b.date) - new Date(a.date));

        const monthlyTotal = filtered.reduce((s, e) => s + e.amount, 0);

        document.getElementById('m-total').textContent  = fmt(monthlyTotal);
        document.getElementById('m-weekly').textContent = fmt(monthlyTotal / (daysInMonth / 7));
        document.getElementById('m-daily').textContent  = fmt(monthlyTotal / daysInMonth);
        document.getElementById('m-hourly').textContent = fmt(monthlyTotal / (daysInMonth * 8));

        // Annual
        const yearlyTotal = entries
            .filter(e => e.date.startsWith(String(year)))
            .reduce((s, e) => s + e.amount, 0);

        document.getElementById('y-total').textContent  = fmt(yearlyTotal);
        document.getElementById('y-weekly').textContent = fmt(yearlyTotal / 52);
        document.getElementById('y-daily').textContent  = fmt(yearlyTotal / 365);
        document.getElementById('y-hourly').textContent = fmt(yearlyTotal / (365 * 8));

        // Section titles
        const monthName = new Date(year, month - 1, 1).toLocaleString('default', { month: 'long' });
        document.getElementById('title-month').textContent = `${monthName} ${year} Breakdown`;
        document.getElementById('title-year').textContent  = `${year} Annual Breakdown`;

        // Table
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No entries this month</td></tr>';
        } else {
            filtered.forEach(e => {
                const [y, m, d] = e.date.split('-');
                tbody.insertAdjacentHTML('beforeend',
                    `<tr>
                        <td>${m}/${d}</td>
                        <td>${e.name}</td>
                        <td style="color:var(--secondary);font-weight:700">$${e.amount.toFixed(2)}</td>
                        <td><button class="btn-del" onclick="deleteEntry(${e.id})">✕</button></td>
                    </tr>`
                );
            });
        }

        // Datalist
        const dl = document.getElementById('prev-investments');
        dl.innerHTML = '';
        [...new Set(entries.map(e => e.name))].forEach(n => {
            const opt = document.createElement('option');
            opt.value = n;
            dl.appendChild(opt);
        });

        // Chart — last 6 months
        const labels = [], data = [];
        for (let i = 5; i >= 0; i--) {
            const d = new Date(year, month - 1 - i, 1);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            labels.push(d.toLocaleString('default', { month: 'short' }));
            data.push(entries.filter(e => e.date.startsWith(key)).reduce((s, e) => s + e.amount, 0));
        }

        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
        const tickColor = isDark ? '#555' : '#bbb';

        if (incomeChart) incomeChart.destroy();
        incomeChart = new Chart(document.getElementById('incomeChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Income',
                    data,
                    backgroundColor: 'rgba(52,152,219,0.75)',
                    borderRadius: 7,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: gridColor }, ticks: { color: tickColor } },
                    y: {
                        grid: { color: gridColor },
                        ticks: {
                            color: tickColor,
                            callback: v => v >= 1000 ? '$' + (v/1000).toFixed(0) + 'k' : '$' + v
                        }
                    }
                }
            }
        });
    }

    render();
</script>
</body>
</html>
